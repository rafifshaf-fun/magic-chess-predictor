<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Chess - Opponent Predictor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 700px;
            margin: 0 auto;
        }

        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        /* DEATH TOGGLES */
        .death-section {
            background: #f9f9f9;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .death-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }

        .death-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
        }

        .death-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
        }

        .death-toggle:hover {
            border-color: #667eea;
        }

        .death-toggle.dead {
            background: #ffebee;
            border-color: #ef5350;
            color: #c62828;
            font-weight: 600;
        }

        .death-toggle input {
            cursor: pointer;
        }

        .form-section {
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .btn-predict {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-predict:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-reset {
            background: #f0f0f0;
            color: #333;
        }

        .btn-reset:hover {
            background: #e0e0e0;
        }

        .btn-edit {
            background: #f0f0f0;
            color: #333;
            flex: 1;
        }

        .btn-edit:hover {
            background: #e0e0e0;
        }

        /* CONTINUOUS MODE DISPLAY */
        .continuous-section {
            display: none;
            margin-bottom: 30px;
            padding: 20px;
            background: #f5f7fa;
            border-radius: 12px;
            border-left: 4px solid #667eea;
        }

        .continuous-section.active {
            display: block;
        }

        .round-info {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        .info-box {
            background: white;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }

        .info-label {
            font-size: 11px;
            color: #666;
            font-weight: 600;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .info-value {
            font-size: 16px;
            font-weight: 700;
            color: #667eea;
        }

        /* PREDICTION RESULTS */
        .results-section {
            display: none;
            margin-bottom: 30px;
        }

        .results-section.active {
            display: block;
        }

        .prediction-title {
            color: #333;
            font-weight: 600;
            margin-bottom: 20px;
            font-size: 16px;
        }

        .prediction-options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .prediction-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .prediction-card:hover {
            transform: translateX(5px);
            border-color: #667eea;
        }

        .prediction-card input[type="radio"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .prediction-card input[type="radio"]:checked + .card-content {
            color: #667eea;
            font-weight: 600;
        }

        .card-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .radio-circle {
            width: 24px;
            height: 24px;
            border: 2px solid #667eea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .prediction-card input[type="radio"]:checked + .card-content .radio-circle {
            background: #667eea;
        }

        .prediction-card input[type="radio"]:checked + .card-content .radio-circle::after {
            content: '✓';
            color: white;
            font-weight: bold;
        }

        .prediction-label {
            flex: 1;
        }

        .prediction-name {
            font-weight: 600;
            color: #333;
            display: block;
            margin-bottom: 2px;
            font-size: 15px;
        }

        .prediction-confidence {
            font-size: 12px;
            color: #666;
        }

        /* CUSTOM OPPONENT CARD */
        .custom-card {
            background: linear-gradient(135deg, #fff3cd 0%, #ffe699 100%);
            border: 2px solid #ffc107;
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .custom-card:hover {
            transform: translateX(5px);
            border-color: #ff9800;
            background: linear-gradient(135deg, #ffe699 0%, #ffd966 100%);
        }

        .custom-card input[type="radio"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .custom-card input[type="radio"]:checked + .card-content {
            color: #ff6f00;
            font-weight: 600;
        }

        .custom-card .radio-circle {
            border-color: #ff9800;
        }

        .custom-card input[type="radio"]:checked + .card-content .radio-circle {
            background: #ff9800;
        }

        .custom-card input[type="radio"]:checked + .card-content .radio-circle::after {
            content: '✓';
            color: white;
            font-weight: bold;
        }

        /* CUSTOM OPPONENT DROPDOWN */
        .custom-dropdown-section {
            display: none;
            margin-bottom: 20px;
            padding: 15px;
            background: #fff9e6;
            border: 2px solid #ffc107;
            border-radius: 8px;
        }

        .custom-dropdown-section.active {
            display: block;
        }

        .custom-dropdown-label {
            font-size: 13px;
            font-weight: 600;
            color: #ff6f00;
            margin-bottom: 8px;
            display: block;
        }

        .custom-dropdown-select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ffc107;
            border-radius: 8px;
            background: white;
            color: #333;
            font-size: 14px;
            font-weight: 600;
        }

        .custom-dropdown-select:focus {
            outline: none;
            border-color: #ff9800;
            box-shadow: 0 0 0 3px rgba(255, 152, 0, 0.1);
        }

        /* CONFIRM BUTTON */
        .confirm-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }

        .confirm-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .confirm-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* MESSAGES */
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .message.active {
            display: block;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* STATS */
        .stats {
            background: #f0f0f0;
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }

        .stats-item {
            margin: 5px 0;
        }

        .stats-value {
            font-weight: 600;
            color: #333;
        }

        .form-section.hidden {
            display: none;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .death-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .round-info {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Magic Chess Predictor</h1>
        <p class="subtitle">Continuous prediction mode • Dead player filtering</p>

        <!-- DEATH TOGGLES -->
        <div class="death-section">
            <div class="death-title">💀 Mark players as eliminated (won't be predicted):</div>
            <div class="death-grid" id="deathToggleGrid"></div>
        </div>

        <!-- SETUP FORM -->
        <div class="form-section" id="setupForm">
            <div class="form-group">
                <label for="player">🎮 Your Player:</label>
                <select id="player">
                    <option value="">Select Your Player</option>
                    <option value="Player 1">Player 1</option>
                    <option value="Player 2">Player 2</option>
                    <option value="Player 3">Player 3</option>
                    <option value="Player 4">Player 4</option>
                    <option value="Player 5">Player 5</option>
                    <option value="Player 6">Player 6</option>
                    <option value="Player 7">Player 7</option>
                    <option value="Player 8">Player 8</option>
                </select>
            </div>

            <div class="form-group">
                <label for="round">📍 Current Round:</label>
                <select id="round">
                    <option value="">Select Starting Round</option>
                    <option value="I-2">I-2</option>
                    <option value="I-3">I-3</option>
                    <option value="I-4">I-4</option>
                    <option value="II-1">II-1</option>
                    <option value="II-4">II-4</option>
                    <option value="II-5">II-5</option>
                    <option value="II-6">II-6</option>
                    <option value="III-1">III-1</option>
                    <option value="III-2">III-2</option>
                    <option value="III-4">III-4</option>
                    <option value="III-5">III-5</option>
                    <option value="III-6">III-6</option>
                    <option value="IV-1">IV-1</option>
                    <option value="IV-2">IV-2</option>
                    <option value="IV-4">IV-4</option>
                    <option value="IV-5">IV-5</option>
                    <option value="IV-6">IV-6</option>
                    <option value="V-1">V-1</option>
                    <option value="V-2">V-2</option>
                    <option value="V-3">V-3</option>
                </select>
            </div>

            <div class="form-group">
                <label for="lastOpponent">⚔️ Last Opponent (just faced):</label>
                <select id="lastOpponent">
                    <option value="">Select Last Opponent</option>
                    <option value="Player 1">Player 1</option>
                    <option value="Player 2">Player 2</option>
                    <option value="Player 3">Player 3</option>
                    <option value="Player 4">Player 4</option>
                    <option value="Player 5">Player 5</option>
                    <option value="Player 6">Player 6</option>
                    <option value="Player 7">Player 7</option>
                    <option value="Player 8">Player 8</option>
                    <option value="M.Player 1">M.Player 1</option>
                    <option value="M.Player 2">M.Player 2</option>
                    <option value="M.Player 3">M.Player 3</option>
                    <option value="M.Player 4">M.Player 4</option>
                    <option value="M.Player 5">M.Player 5</option>
                    <option value="M.Player 6">M.Player 6</option>
                    <option value="M.Player 7">M.Player 7</option>
                    <option value="M.Player 8">M.Player 8</option>
                </select>
            </div>

            <div class="button-group">
                <button class="btn-predict" onclick="startContinuousMode()">Start Continuous Mode</button>
                <button class="btn-reset" onclick="resetAll()">Clear All</button>
            </div>
        </div>

        <!-- MESSAGE AREA -->
        <div id="message" class="message"></div>

        <!-- CONTINUOUS MODE DISPLAY -->
        <div id="continuousSection" class="continuous-section">
            <div class="round-info">
                <div class="info-box">
                    <div class="info-label">Your Player</div>
                    <div class="info-value" id="displayPlayer">-</div>
                </div>
                <div class="info-box">
                    <div class="info-label">Current Round</div>
                    <div class="info-value" id="displayRound">-</div>
                </div>
                <div class="info-box">
                    <div class="info-label">Last Opponent</div>
                    <div class="info-value" id="displayLastOpp">-</div>
                </div>
            </div>

            <div class="button-group">
                <button class="btn-edit" onclick="editContext()">✏️ Edit</button>
            </div>
        </div>

        <!-- PREDICTION RESULTS -->
        <div id="resultsSection" class="results-section">
            <p class="prediction-title">Who you faced against this round? Select the correct opponent:</p>

            <div class="prediction-options" id="predictionsContainer"></div>

            <!-- CUSTOM OPPONENT CARD -->
            <label class="custom-card">
                <input type="radio" name="prediction" value="custom" onchange="toggleCustomDropdown()">
                <div class="card-content">
                    <div class="radio-circle"></div>
                    <div class="prediction-label">
                        <span class="prediction-name">⚠️ None of the above</span>
                        <span class="prediction-confidence">Select opponent not in predictions</span>
                    </div>
                </div>
            </label>

            <!-- CUSTOM OPPONENT DROPDOWN -->
            <div id="customDropdownSection" class="custom-dropdown-section">
                <label class="custom-dropdown-label">Select opponent:</label>
                <select id="customOpponentSelect" class="custom-dropdown-select">
                    <option value="">-- Choose opponent --</option>
                    <option value="Player 1">Player 1</option>
                    <option value="Player 2">Player 2</option>
                    <option value="Player 3">Player 3</option>
                    <option value="Player 4">Player 4</option>
                    <option value="Player 5">Player 5</option>
                    <option value="Player 6">Player 6</option>
                    <option value="Player 7">Player 7</option>
                    <option value="Player 8">Player 8</option>
                    <option value="M.Player 1">M.Player 1</option>
                    <option value="M.Player 2">M.Player 2</option>
                    <option value="M.Player 3">M.Player 3</option>
                    <option value="M.Player 4">M.Player 4</option>
                    <option value="M.Player 5">M.Player 5</option>
                    <option value="M.Player 6">M.Player 6</option>
                    <option value="M.Player 7">M.Player 7</option>
                    <option value="M.Player 8">M.Player 8</option>
                </select>
            </div>

            <button class="confirm-btn" onclick="confirmAndAdvance()" id="confirmBtn">Confirm & Continue</button>
        </div>

        <!-- STATS -->
        <div class="stats">
            <div class="stats-item">Session logs: <span class="stats-value" id="sessionCount">0</span></div>
            <div class="stats-item">Dead players: <span class="stats-value" id="deadCount">0</span></div>
            <div class="stats-item">Base model: <span class="stats-value">895 samples</span></div>
        </div>
    </div>

    <script>
        // State
        let currentState = {
            player: null,
            round: null,
            lastOpponent: null
        };

        let currentPredictions = [];
        let deadPlayers = new Set();
        const allPlayers = ["Player 1", "Player 2", "Player 3", "Player 4", "Player 5", "Player 6", "Player 7", "Player 8"];
        
        const roundOrder = [
            "I-2", "I-3", "I-4",
            "II-1", "II-4", "II-5", "II-6",
            "III-1", "III-2", "III-4", "III-5", "III-6",
            "IV-1", "IV-2", "IV-4", "IV-5", "IV-6",
            "V-1", "V-2", "V-3"
        ];

        let sessionHistory = [];

        // Initialize death toggles
        function initDeathToggles() {
            const grid = document.getElementById('deathToggleGrid');
            grid.innerHTML = '';
            allPlayers.forEach(player => {
                const isDead = deadPlayers.has(player);
                const html = `
                    <label class="death-toggle ${isDead ? 'dead' : ''}">
                        <input type="checkbox" ${isDead ? 'checked' : ''} onchange="toggleDeath('${player}')">
                        ${player}
                    </label>
                `;
                grid.innerHTML += html;
            });
        }

        function toggleDeath(player) {
            fetch('/api/toggle-death', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ player })
            })
            .then(r => r.json())
            .then(data => {
                deadPlayers = new Set(data.dead_players);
                initDeathToggles();
                document.getElementById('deadCount').textContent = deadPlayers.size;
                
                // If in continuous mode, refresh current prediction
                if (currentState.player && currentState.round && currentState.lastOpponent) {
                    getPrediction();
                }
                
                showMessage(`${player} is now ${deadPlayers.has(player) ? '💀 eliminated' : '✓ alive'}`, 'success');
            })
            .catch(e => showMessage('Error: ' + e, 'error'));
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message active ${type}`;
            setTimeout(() => msg.classList.remove('active'), 3000);
        }

        function startContinuousMode() {
            const player = document.getElementById('player').value;
            const round = document.getElementById('round').value;
            const lastOpponent = document.getElementById('lastOpponent').value;

            if (!player || !round || !lastOpponent) {
                showMessage('Please select all three options to start', 'error');
                return;
            }

            currentState = { player, round, lastOpponent };
            
            document.getElementById('setupForm').classList.add('hidden');
            document.getElementById('continuousSection').classList.add('active');
            document.getElementById('resultsSection').classList.add('active');

            updateDisplay();
            getPrediction();
        }

        function updateDisplay() {
            document.getElementById('displayPlayer').textContent = currentState.player;
            document.getElementById('displayRound').textContent = currentState.round;
            document.getElementById('displayLastOpp').textContent = currentState.lastOpponent;
        }

        function getPrediction() {
            fetch('/api/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    player: currentState.player,
                    round: currentState.round,
                    last_opponent: currentState.lastOpponent
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.error) {
                    showMessage('Error: ' + data.error, 'error');
                    return;
                }

                currentPredictions = data.top3;
                displayPredictions(data.top3);
            })
            .catch(e => showMessage('Network error: ' + e, 'error'));
        }

        function displayPredictions(predictions) {
            const container = document.getElementById('predictionsContainer');
            container.innerHTML = '';

            const options = ['A', 'B', 'C'];
            predictions.forEach((pred, idx) => {
                const [opponent, confidence] = pred;
                const letter = options[idx];

                const html = `
                    <label class="prediction-card">
                        <input type="radio" name="prediction" value="${letter}" onchange="hideCustomDropdown()">
                        <div class="card-content">
                            <div class="radio-circle"></div>
                            <div class="prediction-label">
                                <span class="prediction-name">${opponent}</span>
                                <span class="prediction-confidence">${confidence.toFixed(1)}% confidence</span>
                            </div>
                        </div>
                    </label>
                `;
                container.innerHTML += html;
            });

            document.getElementById('confirmBtn').disabled = true;
            hideCustomDropdown();
        }

        function toggleCustomDropdown() {
            const section = document.getElementById('customDropdownSection');
            const selected = document.querySelector('input[name="prediction"]:checked')?.value === 'custom';
            
            if (selected) {
                section.classList.add('active');
                document.getElementById('confirmBtn').disabled = true;
            } else {
                section.classList.remove('active');
                document.getElementById('customOpponentSelect').value = '';
            }
        }

        function hideCustomDropdown() {
            const section = document.getElementById('customDropdownSection');
            section.classList.remove('active');
            document.getElementById('customOpponentSelect').value = '';
            document.getElementById('confirmBtn').disabled = false;
        }

        function confirmAndAdvance() {
            const selectedValue = document.querySelector('input[name="prediction"]:checked')?.value;
            if (!selectedValue) {
                showMessage('Please select an opponent', 'error');
                return;
            }

            let selectedOpponent;

            if (selectedValue === 'custom') {
                selectedOpponent = document.getElementById('customOpponentSelect').value;
                if (!selectedOpponent) {
                    showMessage('Please select a custom opponent from the dropdown', 'error');
                    return;
                }
            } else {
                const idx = selectedValue.charCodeAt(0) - 65;
                selectedOpponent = currentPredictions[idx][0];
            }

            // Log feedback
            fetch('/api/log-feedback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    player: currentState.player,
                    round: currentState.round,
                    last_opponent: currentState.lastOpponent,
                    selected_option: selectedValue,
                    prediction_options: currentPredictions
                })
            })
            .then(r => r.json())
            .then(data => {
                sessionHistory.push({
                    player: currentState.player,
                    round: currentState.round,
                    lastOpponent: currentState.lastOpponent,
                    opponent: selectedOpponent
                });

                document.getElementById('sessionCount').textContent = sessionHistory.length;

                // Find next round
                const currentIdx = roundOrder.indexOf(currentState.round);
                if (currentIdx >= 0 && currentIdx < roundOrder.length - 1) {
                    const nextRound = roundOrder[currentIdx + 1];
                    
                    // Update state
                    currentState.lastOpponent = selectedOpponent;
                    currentState.round = nextRound;
                    
                    updateDisplay();
                    getPrediction();
                    
                    showMessage(`✓ Logged! Moving to ${nextRound}...`, 'success');
                } else {
                    showMessage('🎉 Match complete! No more rounds.', 'success');
                    setTimeout(() => resetAll(), 2000);
                }
            })
            .catch(e => showMessage('Error: ' + e, 'error'));
        }

        function editContext() {
            document.getElementById('setupForm').classList.remove('hidden');
            document.getElementById('continuousSection').classList.remove('active');
            document.getElementById('resultsSection').classList.remove('active');
        }

        function resetAll() {
            currentState = { player: null, round: null, lastOpponent: null };
            currentPredictions = [];
            sessionHistory = [];
            
            document.getElementById('player').value = '';
            document.getElementById('round').value = '';
            document.getElementById('lastOpponent').value = '';
            document.getElementById('setupForm').classList.remove('hidden');
            document.getElementById('continuousSection').classList.remove('active');
            document.getElementById('resultsSection').classList.remove('active');
            document.getElementById('sessionCount').textContent = '0';
        }

        // Load on page load
        initDeathToggles();
        fetch('/api/session-stats')
            .then(r => r.json())
            .then(data => {
                deadPlayers = new Set(data.dead_players);
                document.getElementById('deadCount').textContent = deadPlayers.size;
                initDeathToggles();
            });
    </script>
</body>
</html>
