<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Chess Predictor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            font-weight: 600;
            font-size: 14px;
            color: #333;
        }

        .emoji {
            font-size: 18px;
        }

        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .player-checkbox {
            display: flex;
            align-items: center;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .player-checkbox:hover {
            border-color: #667eea;
            background: #f5f7ff;
        }

        .player-checkbox input {
            margin-right: 8px;
            cursor: pointer;
        }

        .player-checkbox label {
            cursor: pointer;
            font-size: 14px;
            flex: 1;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 30px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .stats {
            background: #f5f5f5;
            padding: 16px;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }

        .prediction-result {
            background: #f0f7ff;
            border: 2px solid #667eea;
            padding: 16px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .prediction-result.show {
            display: block;
        }

        .prediction-result h3 {
            color: #667eea;
            margin-bottom: 8px;
        }

        .prediction-result p {
            color: #333;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Magic Chess Predictor</h1>
            <p>Continuous prediction mode • Dead player filtering</p>
        </div>

        <!-- Mark players as eliminated -->
        <div class="section">
            <div class="section-title">
                <span class="emoji">⚔️</span>
                Mark players as eliminated (won't be predicted):
            </div>
            <div class="players-grid" id="playersGrid">
                <!-- Dynamically populated -->
            </div>
        </div>

        <!-- Your Player Selection -->
        <div class="section">
            <div class="section-title">
                <span class="emoji">👤</span>
                Your Player:
            </div>
            <select id="playerSelect" style="margin-bottom: 0;">
                <option value="">Select Your Player</option>
            </select>
        </div>

        <!-- Next Round Selection -->
        <div class="section">
            <div class="section-title">
                <span class="emoji">🔮</span>
                Next Round to Predict:
            </div>
            <select id="roundSelect" style="margin-bottom: 0;">
                <option value="">Select Next Round</option>
            </select>
        </div>

        <!-- Last Opponent Selection -->
        <div class="section">
            <div class="section-title">
                <span class="emoji">⚡</span>
                Last Opponent (just faced):
            </div>
            <select id="opponentSelect" style="margin-bottom: 0;">
                <option value="">Select Last Opponent</option>
            </select>
        </div>

        <!-- Buttons -->
        <div class="button-group">
            <button class="btn-primary" onclick="startPrediction()">Start Continuous Mode</button>
            <button class="btn-secondary" onclick="clearAll()">Clear All</button>
        </div>

        <!-- Prediction Result -->
        <div class="prediction-result" id="predictionResult">
            <h3>Prediction Result</h3>
            <p id="resultText"></p>
        </div>

        <!-- Stats -->
        <div class="stats" style="margin-top: 20px;">
            <div>Session logs: <span id="sessionLogs">0</span></div>
            <div>Dead players: <span id="deadPlayersCount">0</span></div>
            <div>Base model: 895 samples</div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let deadPlayers = new Set();

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', async () => {
            await initializePlayers();
            await loadDeadPlayers();
        });

        async function initializePlayers() {
            const players = ['Player 1', 'Player 2', 'Player 3', 'Player 4', 'Player 5', 'Player 6', 'Player 7', 'Player 8', 'Player 9'];
            
            // Create checkboxes
            const grid = document.getElementById('playersGrid');
            grid.innerHTML = '';
            players.forEach(player => {
                const label = document.createElement('label');
                label.className = 'player-checkbox';
                label.innerHTML = `
                    <input type="checkbox" value="${player}" onchange="toggleDeadPlayer(this)">
                    <span>${player}</span>
                `;
                grid.appendChild(label);
            });

            // Populate dropdowns
            populateDropdown('playerSelect', players);
            populateDropdown('opponentSelect', players);

            // Populate rounds
            const rounds = [];
            for (let i = 1; i <= 9; i++) {
                rounds.push(`Round ${i}`);
            }
            populateDropdown('roundSelect', rounds);
        }

        function populateDropdown(elementId, options) {
            const select = document.getElementById(elementId);
            options.forEach(option => {
                const opt = document.createElement('option');
                opt.value = option;
                opt.textContent = option;
                select.appendChild(opt);
            });
        }

        async function toggleDeadPlayer(checkbox) {
            const player = checkbox.value;
            if (checkbox.checked) {
                deadPlayers.add(player);
            } else {
                deadPlayers.delete(player);
            }
            
            // Send to backend
            await fetch(`${API_BASE}/api/toggle-death`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ player: player })
            });

            updateStats();
        }

        async function loadDeadPlayers() {
            try {
                const response = await fetch(`${API_BASE}/api/session-stats`);
                const data = await response.json();
                deadPlayers = new Set(data.dead_players);
                
                // Update checkboxes
                document.querySelectorAll('.player-checkbox input').forEach(checkbox => {
                    checkbox.checked = deadPlayers.has(checkbox.value);
                });
                
                updateStats();
            } catch (error) {
                console.error('Error loading dead players:', error);
            }
        }

        function updateStats() {
            document.getElementById('deadPlayersCount').textContent = deadPlayers.size;
        }

        async function startPrediction() {
            const player = document.getElementById('playerSelect').value;
            const round = document.getElementById('roundSelect').value;
            const opponent = document.getElementById('opponentSelect').value;

            if (!player || !round || !opponent) {
                alert('Please select all three options');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/predict`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        player: player,
                        round: round,
                        opponent: opponent,
                        dead_players: Array.from(deadPlayers)
                    })
                });

                const data = await response.json();
                
                const resultDiv = document.getElementById('predictionResult');
                const resultText = document.getElementById('resultText');
                
                resultText.innerHTML = `
                    <strong>${player}</strong> vs <strong>${opponent}</strong> in ${round}<br>
                    Status: ${data.ok ? '✅ Prediction ready' : '❌ Error'}
                `;
                
                resultDiv.classList.add('show');
            } catch (error) {
                console.error('Prediction error:', error);
                alert('Error making prediction');
            }
        }

        function clearAll() {
            document.getElementById('playerSelect').value = '';
            document.getElementById('roundSelect').value = '';
            document.getElementById('opponentSelect').value = '';
            document.getElementById('predictionResult').classList.remove('show');
        }
    </script>
</body>
</html>
