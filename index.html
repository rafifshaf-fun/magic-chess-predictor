<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Chess - Opponent Predictor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 700px;
            margin: 0 auto;
        }

        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        /* DEATH TOGGLES */
        .death-section {
            background: #f9f9f9;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .death-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }

        .death-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
        }

        .death-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
        }

        .death-toggle:hover {
            border-color: #667eea;
        }

        .death-toggle.dead {
            background: #ffebee;
            border-color: #ef5350;
            color: #c62828;
            font-weight: 600;
        }

        .death-toggle input {
            cursor: pointer;
        }

        .form-section {
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .btn-predict {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-predict:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-reset {
            background: #f0f0f0;
            color: #333;
        }

        .btn-reset:hover {
            background: #e0e0e0;
        }

        /* PREDICTION RESULTS */
        .results-section {
            display: none;
            margin-bottom: 30px;
        }

        .results-section.active {
            display: block;
        }

        .prediction-title {
            color: #333;
            font-weight: 600;
            margin-bottom: 20px;
            font-size: 16px;
        }

        .prediction-options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .prediction-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .prediction-card:hover {
            transform: translateX(5px);
            border-color: #667eea;
        }

        .prediction-card input[type="radio"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .prediction-card input[type="radio"]:checked + .card-content {
            color: #667eea;
            font-weight: 600;
        }

        .prediction-card input[type="radio"]:checked {
            accent-color: #667eea;
        }

        .card-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .radio-circle {
            width: 24px;
            height: 24px;
            border: 2px solid #667eea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .prediction-card input[type="radio"]:checked + .card-content .radio-circle {
            background: #667eea;
        }

        .prediction-card input[type="radio"]:checked + .card-content .radio-circle::after {
            content: '✓';
            color: white;
            font-weight: bold;
        }

        .prediction-label {
            flex: 1;
        }

        .prediction-name {
            font-weight: 600;
            color: #333;
            display: block;
            margin-bottom: 2px;
        }

        .prediction-confidence {
            font-size: 12px;
            color: #666;
        }

        /* CUSTOM OPPONENT */
        .custom-section {
            background: #f9f9f9;
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .custom-section label {
            margin-bottom: 10px;
            font-size: 14px;
        }

        .custom-section input {
            margin-bottom: 10px;
        }

        /* CONFIRM BUTTON */
        .confirm-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }

        .confirm-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        /* MESSAGES */
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .message.active {
            display: block;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* STATS */
        .stats {
            background: #f0f0f0;
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }

        .stats-item {
            margin: 5px 0;
        }

        .stats-value {
            font-weight: 600;
            color: #333;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 24px;
            }

            .death-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Magic Chess Predictor</h1>
        <p class="subtitle">Session-based learning • Dead player filtering</p>

        <!-- DEATH TOGGLES -->
        <div class="death-section">
            <div class="death-title">💀 Mark players as eliminated (won't be predicted):</div>
            <div class="death-grid" id="deathToggleGrid"></div>
        </div>

        <!-- INPUT SECTION -->
        <div class="form-section">
            <div class="form-group">
                <label for="player">Player:</label>
                <select id="player">
                    <option value="">Select Player</option>
                    <option value="Player 1">Player 1</option>
                    <option value="Player 2">Player 2</option>
                    <option value="Player 3">Player 3</option>
                    <option value="Player 4">Player 4</option>
                    <option value="Player 5">Player 5</option>
                    <option value="Player 6">Player 6</option>
                    <option value="Player 7">Player 7</option>
                    <option value="Player 8">Player 8</option>
                </select>
            </div>

            <div class="form-group">
                <label for="round">Round:</label>
                <select id="round">
                    <option value="">Select Round</option>
                    <option value="I-1">I-1</option>
                    <option value="I-2">I-2</option>
                    <option value="I-3">I-3</option>
                    <option value="I-4">I-4</option>
                    <option value="II-1">II-1</option>
                    <option value="II-2">II-2</option>
                    <option value="II-3">II-3</option>
                    <option value="II-4">II-4</option>
                    <option value="II-5">II-5</option>
                    <option value="II-6">II-6</option>
                    <option value="III-1">III-1</option>
                    <option value="III-2">III-2</option>
                    <option value="III-3">III-3</option>
                    <option value="III-4">III-4</option>
                    <option value="III-5">III-5</option>
                    <option value="III-6">III-6</option>
                    <option value="IV-1">IV-1</option>
                    <option value="IV-2">IV-2</option>
                    <option value="IV-3">IV-3</option>
                    <option value="IV-4">IV-4</option>
                    <option value="IV-5">IV-5</option>
                    <option value="IV-6">IV-6</option>
                    <option value="V-1">V-1</option>
                    <option value="V-2">V-2</option>
                </select>
            </div>

            <div class="form-group">
                <label for="lastOpponent">Last Opponent:</label>
                <select id="lastOpponent">
                    <option value="">Select Last Opponent</option>
                    <option value="Player 1">Player 1</option>
                    <option value="Player 2">Player 2</option>
                    <option value="Player 3">Player 3</option>
                    <option value="Player 4">Player 4</option>
                    <option value="Player 5">Player 5</option>
                    <option value="Player 6">Player 6</option>
                    <option value="Player 7">Player 7</option>
                    <option value="Player 8">Player 8</option>
                </select>
            </div>

            <div class="button-group">
                <button class="btn-predict" onclick="getPrediction()">Get Prediction</button>
                <button class="btn-reset" onclick="resetForm()">Clear</button>
            </div>
        </div>

        <!-- MESSAGE AREA -->
        <div id="message" class="message"></div>

        <!-- RESULTS SECTION -->
        <div id="resultsSection" class="results-section">
            <p class="prediction-title">Which opponent did you face? Select A, B, C or enter custom:</p>

            <div class="prediction-options" id="predictionsContainer"></div>

            <div class="custom-section">
                <label>
                    <input type="radio" name="prediction" value="custom" onchange="toggleCustom()">
                    None of these - Enter actual opponent:
                </label>
                <input type="text" id="customOpponent" placeholder="Enter opponent name" style="display:none;">
            </div>

            <button class="confirm-btn" onclick="confirmFeedback()">Confirm & Log</button>
        </div>

        <!-- STATS -->
        <div class="stats">
            <div class="stats-item">Session logs: <span class="stats-value" id="sessionCount">0</span></div>
            <div class="stats-item">Dead players: <span class="stats-value" id="deadCount">0</span></div>
            <div class="stats-item">Base model samples: <span class="stats-value">376</span></div>
        </div>
    </div>

    <script>
        let currentPredictions = [];
        let deadPlayers = [];
        const allPlayers = ["Player 1", "Player 2", "Player 3", "Player 4", "Player 5", "Player 6", "Player 7", "Player 8"];

        // Initialize death toggles
        function initDeathToggles() {
            const grid = document.getElementById('deathToggleGrid');
            grid.innerHTML = '';
            allPlayers.forEach(player => {
                const isDead = deadPlayers.includes(player);
                const html = `
                    <label class="death-toggle ${isDead ? 'dead' : ''}">
                        <input type="checkbox" ${isDead ? 'checked' : ''} onchange="toggleDeath('${player}')">
                        ${player}
                    </label>
                `;
                grid.innerHTML += html;
            });
        }

        function toggleDeath(player) {
            fetch('/api/toggle-death', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ player })
            })
            .then(r => r.json())
            .then(data => {
                deadPlayers = data.dead_players;
                initDeathToggles();
                document.getElementById('deadCount').textContent = deadPlayers.length;
                showMessage(`${player} is now ${deadPlayers.includes(player) ? '💀 eliminated' : '✓ alive'}`, 'success');
            })
            .catch(e => showMessage('Error: ' + e, 'error'));
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message active ${type}`;
            setTimeout(() => {
                msg.classList.remove('active');
            }, 3000);
        }

        function getPrediction() {
            const player = document.getElementById('player').value;
            const round = document.getElementById('round').value;
            const lastOpponent = document.getElementById('lastOpponent').value;

            if (!player || !round || !lastOpponent) {
                showMessage('Please select Player, Round, and Last Opponent', 'error');
                return;
            }

            fetch('/api/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ player, round, last_opponent: lastOpponent })
            })
            .then(r => r.json())
            .then(data => {
                if (data.error) {
                    showMessage('Error: ' + data.error, 'error');
                    return;
                }

                currentPredictions = data.top3;
                displayPredictions(data.top3);
                document.getElementById('resultsSection').classList.add('active');
                
                let msg = `Prediction ready!`;
                if (data.dead_players.length > 0) {
                    msg += ` (${data.dead_players.join(', ')} excluded)`;
                }
                showMessage(msg, 'success');
            })
            .catch(e => showMessage('Network error: ' + e, 'error'));
        }

        function displayPredictions(predictions) {
            const container = document.getElementById('predictionsContainer');
            container.innerHTML = '';

            const options = ['A', 'B', 'C'];
            predictions.forEach((pred, idx) => {
                const [opponent, confidence] = pred;
                const letter = options[idx];

                const html = `
                    <label class="prediction-card">
                        <input type="radio" name="prediction" value="${letter}">
                        <div class="card-content">
                            <div class="radio-circle"></div>
                            <div class="prediction-label">
                                <span class="prediction-name">${letter}: ${opponent}</span>
                                <span class="prediction-confidence">${confidence.toFixed(1)}% confidence</span>
                            </div>
                        </div>
                    </label>
                `;
                container.innerHTML += html;
            });
        }

        function toggleCustom() {
            const customInput = document.getElementById('customOpponent');
            const isChecked = document.querySelector('input[name="prediction"][value="custom"]').checked;
            customInput.style.display = isChecked ? 'block' : 'none';
        }

        function confirmFeedback() {
            const player = document.getElementById('player').value;
            const round = document.getElementById('round').value;
            const lastOpponent = document.getElementById('lastOpponent').value;

            let selectedOption = document.querySelector('input[name="prediction"]:checked')?.value;
            if (!selectedOption) {
                showMessage('Please select an option', 'error');
                return;
            }

            let actualOpponent = selectedOption;
            if (selectedOption === 'custom') {
                actualOpponent = document.getElementById('customOpponent').value.trim();
                if (!actualOpponent) {
                    showMessage('Please enter the actual opponent', 'error');
                    return;
                }
            }

            fetch('/api/log-feedback', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    player,
                    round,
                    last_opponent: lastOpponent,
                    selected_option: selectedOption,
                    prediction_options: currentPredictions
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.error) {
                    showMessage('Error: ' + data.error, 'error');
                    return;
                }

                document.getElementById('sessionCount').textContent = data.session_size;
                showMessage(`✓ Logged: ${actualOpponent} was your opponent!`, 'success');
                resetForm();
            })
            .catch(e => showMessage('Network error: ' + e, 'error'));
        }

        function resetForm() {
            document.getElementById('player').value = '';
            document.getElementById('round').value = '';
            document.getElementById('lastOpponent').value = '';
            document.getElementById('resultsSection').classList.remove('active');
            document.getElementById('customOpponent').value = '';
            document.getElementById('customOpponent').style.display = 'none';

            updateStats();
        }

        function updateStats() {
            fetch('/api/session-stats')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('sessionCount').textContent = data.session_matches_logged;
                    deadPlayers = data.dead_players;
                    document.getElementById('deadCount').textContent = deadPlayers.length;
                    initDeathToggles();
                });
        }

        // Load on page load
        initDeathToggles();
        updateStats();
    </script>
</body>
</html>
